<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SkyNet Panel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

<h1>Robot Control Panel</h1>

<div class="top-bar">
    <button onclick="logout()">Logout</button>
    <button id="themeBtn" 
    <button onclick="EnderPhone()">On site SkyNet EnderPhone</button>
</div>

<input id="search" placeholder="Search robot..." oninput="displayRobots()">

<div class="button-group">
    <button onclick="connectToRobot()">Connect Robot</button>
    <button onclick="downloadFirmware()">Download Firmware</button>
    <button onclick="updateFirmware()">Update Firmware</button>
    <button onclick="exportData()">Export</button>
    <button onclick="importData()">Import</button>
</div>

<ul id="robotList"></ul>

<script src="auth.js"></script>
<script src="robots.js"></script>
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
}
document.getElementById("who")?.innerText = "Logged as: " + localStorage.getItem("currentUser");
displayRobots();
</script>
</body>
</html>
